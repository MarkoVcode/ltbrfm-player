<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LTBR·FM — Receiver</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

<div class="unit" id="faceDefault">
  <span class="screw tl"></span><span class="screw tr"></span>
  <span class="screw bl"></span><span class="screw br"></span>

  <div class="face">

    <div class="brand-row">
      <div class="brand">LTBR<span class="dot">.</span><span class="fm">FM</span></div>
      <div class="strap">London Tower Block Radio</div>
      <div class="tx" id="txState" title="">
        <svg class="info" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1.2 15h-2.4v-6.5h2.4V17zm0-8.5h-2.4V6h2.4v2.5z"/></svg>
        <span class="led"></span><span id="txLabel">Standby</span>
      </div>
      <button class="power" id="btnPower" title="Power off" aria-label="Power off">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 3.5v7.5"/>
          <path d="M7.2 6.4a7 7 0 1 0 9.6 0"/>
        </svg>
      </button>
    </div>

    <div class="windows">
      <div class="window w-scroll"><canvas id="scroller" height="46"></canvas></div>
      <div class="window w-spec"><canvas id="spectrum" height="78"></canvas></div>
    </div>

    <div class="transport">
      <div class="keys">
        <button class="key" id="btnPlay" aria-pressed="false" title="Play / Pause (Space)" aria-label="Play">
          <svg viewBox="0 0 24 24" id="icoPlay"><path d="M7 4l13 8-13 8z"/></svg>
        </button>
        <button class="key" id="btnStop" title="Stop" aria-label="Stop">
          <svg viewBox="0 0 24 24"><path d="M5 5h14v14H5z"/></svg>
        </button>
        <button class="key" id="btnEq" aria-pressed="true" title="Graphic equaliser (E)" aria-label="Show or hide the graphic equaliser">
          <svg viewBox="0 0 24 24"><path d="M5 4h2v5H5zM4 10h4v3H4zM5 14h2v6H5zM11 4h2v9h-2zM10 14h4v3h-4zM11 18h2v2h-2zM17 4h2v3h-2zM16 8h4v3h-4zM17 12h2v8h-2z"/></svg>
        </button>
        <button class="key" id="btnMute" aria-pressed="false" title="Mute (M)" aria-label="Mute">
          <svg viewBox="0 0 24 24" id="icoVol"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 8.5c1.4 1 1.4 6 0 7" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
      </div>

      <div class="meta">
        <span class="lbl">Receiving</span>
        <span class="val" id="metaVal">— no carrier —</span>
      </div>

      <div class="vol">
        <span class="lbl">Level</span>
        <div class="fader-h" id="volFader" tabindex="0" role="slider"
             aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80">
          <div class="slot"></div><div class="cap"></div>
        </div>
      </div>
    </div>

    <div class="eq">
      <div class="eq-head">
        <span class="title">Graphic Equaliser</span>
        <div class="presets">
          <button class="chip" data-preset="flat">Flat</button>
          <button class="chip" data-preset="pirate">Pirate</button>
          <button class="chip" data-preset="bass">Bass</button>
          <button class="chip" data-preset="voice">Voice</button>
        </div>
      </div>
      <div class="bands" id="bands"></div>
    </div>

    <div class="source">
      <label for="streamUrl">Stream</label>
      <input id="streamUrl" type="url" spellcheck="false"
             value="https://stream.ltbr.fm/live"
             placeholder="https://…" />
      <button class="tune" id="btnTune">Tune</button>
    </div>

    <div class="fault" id="fault" role="status" aria-live="polite"></div>

  </div>
</div>

<!-- Vintage 80s UK receiver face — hidden until selected from the menu.
     Skeuomorphic chrome lives in faces/vintage/vintage.css; the dial glass
     and VU meters are canvases painted by faces/vintage/*.ts. -->
<div class="vunit" id="faceVintage" hidden>
  <div class="vface">

    <div class="vtop">
      <div class="vbrand">
        <span class="vname">LTBR<i>.</i>FM</span>
        <small>Wavemaster 3000 &nbsp;·&nbsp; Stereo FM Receiver &nbsp;·&nbsp; London</small>
      </div>
      <div class="vmeters">
        <div class="vmeter"><canvas id="vVuL"></canvas></div>
        <div class="vmeter"><canvas id="vVuR"></canvas></div>
      </div>
    </div>

    <div class="vdial-bezel">
      <canvas id="vDial"></canvas>
      <div class="vdial-glass"></div>
    </div>

    <div class="vcontrols">
      <div class="vgroup vkeys-group">
        <div class="vkeys">
          <button class="vkey" id="vPower" aria-pressed="false"
                  title="Power" aria-label="Power">POWER<span class="vdot"></span></button>
          <button class="vkey" id="vMute" aria-pressed="false"
                  title="Mute" aria-label="Mute">MUTE</button>
          <button class="vkey" id="vEq"
                  title="Graphic equaliser" aria-label="Show or hide the graphic equaliser">EQ</button>
        </div>
        <span class="vlbl">Function</span>
      </div>
      <div class="vgroup">
        <div class="vknob" id="vknobVol" tabindex="0" role="slider"
             aria-label="Volume" aria-valuemin="0" aria-valuemax="100">
          <div class="vknob-cap"><div class="vknob-mark"></div></div>
        </div>
        <span class="vlbl">Volume</span>
      </div>
      <div class="vgroup">
        <div class="vknob vknob-big" id="vknobTune" tabindex="0" role="slider"
             aria-label="Tuning" aria-valuemin="87.5" aria-valuemax="108.5">
          <div class="vknob-cap"><div class="vknob-mark"></div></div>
        </div>
        <span class="vlbl">Tuning</span>
      </div>
    </div>

    <div id="veqSlot"></div>

  </div>
</div>

<div class="ctx" id="ctxMenu" role="menu" aria-label="Window options">
  <button class="ctx-item" id="ctxOnTop" role="menuitemcheckbox" aria-checked="false">
    <span class="ctx-led"></span>Always on Top
  </button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" id="ctxFaceDefault" role="menuitemradio" aria-checked="true">
    <span class="ctx-led"></span>Face: Receiver
  </button>
  <button class="ctx-item" id="ctxFaceVintage" role="menuitemradio" aria-checked="false">
    <span class="ctx-led"></span>Face: Vintage 80s
  </button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" id="ctxExit" role="menuitem">
    <span class="ctx-led"></span>Exit
  </button>
  <div class="ctx-version" id="ctxVersion" aria-hidden="true"></div>
</div>

<script type="module" src="./main.ts"></script>
</body>
</html>
