<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#2a2521"/>
      <stop offset="70%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc247"/>
      <stop offset="100%" stop-color="#ff9b21"/>
    </linearGradient>
  </defs>

  <!-- rack panel -->
  <rect x="40" y="40" width="944" height="944" rx="150" fill="url(#bg)" stroke="#000" stroke-width="6"/>
  <rect x="40" y="40" width="944" height="944" rx="150" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="3"/>

  <!-- inset display window -->
  <rect x="150" y="300" width="724" height="424" rx="36" fill="#0a0908" stroke="#000" stroke-width="4"/>

  <!-- spectrum bars -->
  <g fill="url(#cap)">
    <rect x="214" y="560" width="86" height="120" rx="10"/>
    <rect x="330" y="470" width="86" height="210" rx="10"/>
    <rect x="446" y="392" width="86" height="288" rx="10"/>
    <rect x="562" y="500" width="86" height="180" rx="10"/>
    <rect x="678" y="430" width="86" height="250" rx="10"/>
  </g>
  <!-- dim tops (ghost segments) -->
  <g fill="#3a2610">
    <rect x="214" y="360" width="86" height="180" rx="10"/>
    <rect x="330" y="360" width="86" height="90" rx="10"/>
    <rect x="562" y="360" width="86" height="120" rx="10"/>
    <rect x="678" y="360" width="86" height="50" rx="10"/>
  </g>

  <!-- transmit LED -->
  <circle cx="820" cy="212" r="42" fill="#ff3f1c"/>
  <circle cx="820" cy="212" r="42" fill="none" stroke="#ff3f1c" stroke-opacity="0.4" stroke-width="26"/>

  <!-- LTBR·FM wordmark tick -->
  <rect x="150" y="196" width="360" height="30" rx="15" fill="#d8d0c4"/>
  <rect x="150" y="196" width="150" height="30" rx="15" fill="#ff9b21"/>
</svg>
