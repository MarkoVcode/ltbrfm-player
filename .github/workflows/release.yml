name: release

# Build installable binaries for Linux, Windows and macOS and attach them to a
# GitHub Release. Triggered by pushing a version tag (e.g. `v0.1.0`), or run
# manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# tauri-action creates/uploads a release, which needs write access.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          # Intel macOS (cross-compiled from the arm64 runner)
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          # Linux (deb / rpm / AppImage)
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          # Windows (NSIS .exe + .msi)
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Code signing (optional) ----
          # IMPORTANT: only uncomment these once the secrets actually exist.
          # Passing them while empty makes the bundler attempt to import a
          # blank certificate and the macOS build fails at codesign.
          #
          # macOS signing + notarization:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LTBR·FM Receiver ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below. See the assets for `.dmg` (macOS), `.msi`/`.exe` (Windows) and `.AppImage`/`.deb`/`.rpm` (Linux)."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
